<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{CLIENT_NAME}} | RampFuel Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #121434;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo { height: 52px; margin-bottom: 24px; }

    .client-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }

    .client-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* ── Tabs ───────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 32px;
    }

    .tab {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: none;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: rgba(255,255,255,0.75); }
    .tab.active { color: #fff; border-bottom-color: #4f46e5; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Section label ──────────────────────────────────────── */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    .section-label:first-child { margin-top: 0; }

    /* ── Dashboard: Progress ring ───────────────────────────── */
    .dash-top {
      display: flex;
      align-items: center;
      gap: 32px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .ring-wrap { flex-shrink: 0; position: relative; width: 110px; height: 110px; }

    .ring-wrap svg { width: 110px; height: 110px; }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .ring-pct {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .ring-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    .dash-summary { flex: 1; }

    .dash-summary h2 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .dash-summary p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.55;
    }

    /* ── Dashboard: Stat cards ──────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
    }

    .stat-card.overdue { border-color: rgba(248,113,113,0.3); }

    .stat-num {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card.overdue .stat-num { color: #f87171; }

    .stat-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
    }

    /* ── Dashboard: Recent completions ─────────────────────── */
    .recent-list { display: flex; flex-direction: column; gap: 8px; }

    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .recent-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(74,222,128,0.15);
      border: 1px solid rgba(74,222,128,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      color: #4ade80;
    }

    .recent-name {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-decoration: line-through;
      text-decoration-color: rgba(255,255,255,0.2);
    }

    /* ── Focus card ─────────────────────────────────────────── */
    .focus-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 26px 26px 22px;
      transition: opacity 0.3s;
    }

    .focus-card .task-name {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 18px;
    }

    /* ── Task list ──────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 16px;
      gap: 16px;
      transition: opacity 0.3s;
    }

    .task-row .task-name {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      line-height: 1.4;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn-complete {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-complete:hover { background: #4338ca; }
    .btn-complete:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-complete-sm {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.55);
      border-radius: 6px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-complete-sm:hover { border-color: rgba(255,255,255,0.45); color: #fff; }
    .btn-complete-sm:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-submit {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-submit:hover { background: #4338ca; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Egnyte ─────────────────────────────────────────────── */
    .egnyte-wrapper {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    .egnyte-frame { width: 100%; height: 480px; border: none; display: block; }

    .egnyte-fallback { display: none; padding: 40px 24px; text-align: center; }

    .egnyte-fallback p {
      color: rgba(255,255,255,0.45);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .btn-egnyte {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-egnyte:hover { background: rgba(255,255,255,0.13); }

    /* ── Ticket form ────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 7px;
    }

    .form-label span {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      color: rgba(255,255,255,0.25);
      margin-left: 4px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: rgba(79,70,229,0.65);
    }

    .form-textarea { resize: vertical; min-height: 100px; }
    .form-select option { background: #1e2050; color: #fff; }

    .category-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── States ─────────────────────────────────────────────── */
    .state-msg {
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 14px;
      padding: 48px 0;
      line-height: 1.7;
    }

    .state-msg.error { color: #f87171; }

    /* ── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e2050;
      border: 1px solid rgba(79,70,229,0.5);
      color: #fff;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 64px;
      font-size: 12px;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <img class="logo"
      src="https://raw.githubusercontent.com/RampFuel/RampFuelLogo/main/Transparent%20logo.png"
      alt="RampFuel" />
    <div class="client-label">RampFuel Client Portal</div>
    <div class="client-name">RampFuel</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard', this)">&#9632; Dashboard</button>
    <button class="tab" onclick="switchTab('tasks', this)">&#10003; Tasks</button>
    <button class="tab" onclick="switchTab('files', this)">&#128193; Files</button>
    <button class="tab" onclick="switchTab('request', this)">&#43; Request</button>
  </div>

  <!-- Dashboard -->
  <div id="panel-dashboard" class="panel active">
    <div id="dashContent">
      <div class="state-msg">Loading dashboard...</div>
    </div>
  </div>

  <!-- Tasks -->
  <div id="panel-tasks" class="panel">
    <div id="tasksContent">
      <div class="state-msg">Fetching your tasks...</div>
    </div>
  </div>

  <!-- Files -->
  <div id="panel-files" class="panel">
    <div class="egnyte-wrapper">
      <iframe
        id="egnyteFrame"
        class="egnyte-frame"
        src="{{EGNYTE_FOLDER_URL}}"
        onload="onEgnyteLoad(this)"
        onerror="showEgnyteFallback()"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
        title="Client Files"
      ></iframe>
      <div id="egnyteFallback" class="egnyte-fallback">
        <p>Folder preview is not available in this browser.<br>Open directly in Egnyte instead.</p>
        <a class="btn-egnyte" href="{{EGNYTE_FOLDER_URL}}" target="_blank" rel="noopener">
          &#128193; Open Client Folder
        </a>
      </div>
    </div>
  </div>

  <!-- Request -->
  <div id="panel-request" class="panel">
    <div class="section-label">Submit a Request</div>
    <form id="ticketForm" onsubmit="submitTicket(event)">
      <div class="form-group">
        <label class="form-label" for="ticketTitle">Request Title</label>
        <input class="form-input" id="ticketTitle" type="text"
          placeholder="e.g. Update partner one-pager" required maxlength="200" />
      </div>
      <div class="form-group">
        <label class="form-label" for="ticketDesc">Description</label>
        <textarea class="form-textarea" id="ticketDesc"
          placeholder="Describe what you need, any context or deadlines..." required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Category <span>(optional)</span></label>
        <div class="category-row">
          <select class="form-select" id="ticketContent">
            <option value="">Content...</option>
            <option value="Blog Post">Blog Post</option>
            <option value="One-Pager">One-Pager</option>
            <option value="Case Study">Case Study</option>
            <option value="Email Copy">Email Copy</option>
            <option value="Social Post">Social Post</option>
            <option value="Other Content">Other Content</option>
          </select>
          <select class="form-select" id="ticketStrategy">
            <option value="">Strategy...</option>
            <option value="GTM Planning">GTM Planning</option>
            <option value="Channel Strategy">Channel Strategy</option>
            <option value="Partner Enablement">Partner Enablement</option>
            <option value="Marketplace">Marketplace</option>
            <option value="Other Strategy">Other Strategy</option>
          </select>
        </div>
      </div>
      <button class="btn-submit" type="submit" id="submitBtn">Submit Request</button>
    </form>
  </div>

  <div class="footer">Powered by RampFuel &mdash; Growth Advisory &amp; Ecosystem Acceleration</div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─────────────────────────────────────────────────────────────
  // PER-CLIENT CONFIG — filled by onboarding Zap
  // ─────────────────────────────────────────────────────────────
  const CLIENT_NAME       = "{{CLIENT_NAME}}";
  const PROJECT_GID       = "{{PROJECT_GID}}";
  const WORKER_URL        = "{{WORKER_URL}}";
  const HOOK_COMPLETE     = "https://hooks.zapier.com/hooks/catch/25374556/unkatbi/";
  const HOOK_TICKET       = "{{ZAPIER_TICKET_HOOK}}";

  // ─────────────────────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────────────────────
  let allTasks = [];

  // ─────────────────────────────────────────────────────────────
  // Tab switching
  // ─────────────────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + name).classList.add("active");
  }

  // ─────────────────────────────────────────────────────────────
  // Fetch tasks (shared between dashboard + tasks tab)
  // ─────────────────────────────────────────────────────────────
  async function fetchTasks() {
    if (!WORKER_URL || WORKER_URL === "{{WORKER_URL}}") return null;
    const res = await fetch(`${WORKER_URL}/tasks?project=${PROJECT_GID}`);
    if (!res.ok) throw new Error(`Worker returned ${res.status}`);
    return await res.json();
  }

  // ─────────────────────────────────────────────────────────────
  // Dashboard
  // ─────────────────────────────────────────────────────────────
  async function loadDashboard() {
    const el = document.getElementById("dashContent");

    if (!WORKER_URL || WORKER_URL === "{{WORKER_URL}}") {
      el.innerHTML = `<div class="state-msg">Dashboard will be available once the portal is fully configured.</div>`;
      return;
    }

    try {
      const tasks = await fetchTasks();
      allTasks = tasks;

      const today    = new Date().toISOString().split("T")[0];
      const open     = tasks.filter(t => !t.completed);
      const done     = tasks.filter(t => t.completed);
      const overdue  = open.filter(t => t.due_on && t.due_on < today);
      const total    = tasks.length;
      const pct      = total > 0 ? Math.round((done.length / total) * 100) : 0;

      const circumference = 2 * Math.PI * 45;
      const offset = circumference - (circumference * pct / 100);

      const statusText = overdue.length > 0
        ? `${overdue.length} task${overdue.length > 1 ? "s are" : " is"} past due.`
        : open.length > 0
          ? `${open.length} task${open.length > 1 ? "s" : ""} remaining.`
          : "All tasks complete!";

      const recent = done
        .sort((a, b) => new Date(b.completed_at || 0) - new Date(a.completed_at || 0))
        .slice(0, 3);

      let html = `
        <div class="dash-top">
          <div class="ring-wrap">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" fill="none"
                stroke="rgba(255,255,255,0.08)" stroke-width="9"/>
              <circle cx="50" cy="50" r="45" fill="none"
                stroke="#4f46e5" stroke-width="9"
                stroke-dasharray="${circumference.toFixed(1)}"
                stroke-dashoffset="${offset.toFixed(1)}"
                stroke-linecap="round"
                transform="rotate(-90 50 50)"
                style="transition: stroke-dashoffset 0.8s ease"/>
            </svg>
            <div class="ring-center">
              <div class="ring-pct">${pct}%</div>
              <div class="ring-sub">done</div>
            </div>
          </div>
          <div class="dash-summary">
            <h2>${pct === 100 ? "All caught up!" : "Engagement in progress"}</h2>
            <p>${statusText}<br>
            ${total} total task${total !== 1 ? "s" : ""} tracked for this engagement.</p>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-num">${open.length}</div>
            <div class="stat-name">Open</div>
          </div>
          <div class="stat-card">
            <div class="stat-num">${done.length}</div>
            <div class="stat-name">Completed</div>
          </div>
          <div class="stat-card overdue">
            <div class="stat-num">${overdue.length}</div>
            <div class="stat-name">Overdue</div>
          </div>
        </div>
      `;

      if (recent.length > 0) {
        html += `<div class="section-label">Recently Completed</div><div class="recent-list">`;
        for (const t of recent) {
          html += `
            <div class="recent-item">
              <div class="recent-check">&#10003;</div>
              <div class="recent-name">${esc(t.name)}</div>
            </div>
          `;
        }
        html += `</div>`;
      }

      el.innerHTML = html;

    } catch (err) {
      el.innerHTML = `<div class="state-msg error">Could not load dashboard.<br>${err.message}</div>`;
    }
  }

  // ─────────────────────────────────────────────────────────────
  // Tasks tab
  // ─────────────────────────────────────────────────────────────
  async function loadTasks() {
    const el = document.getElementById("tasksContent");

    if (!WORKER_URL || WORKER_URL === "{{WORKER_URL}}") {
      el.innerHTML = `<div class="state-msg">Task list coming soon.<br>Use the <strong>Request</strong> tab to submit requests.</div>`;
      return;
    }

    try {
      const tasks = allTasks.length ? allTasks : await fetchTasks();
      allTasks = tasks;
      const open = tasks.filter(t => !t.completed);

      if (open.length === 0) {
        el.innerHTML = `<div class="state-msg">&#127881; All tasks complete!</div>`;
        return;
      }

      const [current, ...upcoming] = open;

      let html = `
        <div class="section-label">Current Focus</div>
        <div class="focus-card" id="focus-${current.gid}">
          <div class="task-name">${esc(current.name)}</div>
          <button class="btn-complete" onclick="markComplete('${current.gid}', this)">
            &#10003;&nbsp; Mark as Complete
          </button>
        </div>
      `;

      if (upcoming.length > 0) {
        html += `<div class="section-label">Up Next</div><div class="task-list">`;
        for (const t of upcoming) {
          html += `
            <div class="task-row" id="row-${t.gid}">
              <div class="task-name">${esc(t.name)}</div>
              <button class="btn-complete-sm" onclick="markComplete('${t.gid}', this)">Complete</button>
            </div>
          `;
        }
        html += `</div>`;
      }

      el.innerHTML = html;

    } catch (err) {
      el.innerHTML = `<div class="state-msg error">Could not load tasks.<br>${err.message}</div>`;
    }
  }

  // ─────────────────────────────────────────────────────────────
  // Mark complete
  // ─────────────────────────────────────────────────────────────
  async function markComplete(taskGid, btn) {
    btn.disabled = true;
    btn.textContent = "Marking...";

    try {
      await fetch(HOOK_COMPLETE, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task_gid: taskGid })
      });

      allTasks = allTasks.map(t =>
        t.gid === taskGid ? { ...t, completed: true, completed_at: new Date().toISOString() } : t
      );

      const el = document.getElementById(`focus-${taskGid}`) ||
                 document.getElementById(`row-${taskGid}`);
      if (el) { el.style.opacity = "0"; }
      setTimeout(() => { loadTasks(); loadDashboard(); }, 400);

    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Retry";
      alert("Something went wrong: " + err.message);
    }
  }

  // ─────────────────────────────────────────────────────────────
  // Egnyte
  // ─────────────────────────────────────────────────────────────
  function onEgnyteLoad(frame) {
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      if (!doc || !doc.body || doc.body.innerHTML.trim() === "") showEgnyteFallback();
    } catch(e) { showEgnyteFallback(); }
  }

  function showEgnyteFallback() {
    document.getElementById("egnyteFrame").style.display = "none";
    document.getElementById("egnyteFallback").style.display = "block";
  }

  // ─────────────────────────────────────────────────────────────
  // Submit ticket
  // ─────────────────────────────────────────────────────────────
  async function submitTicket(e) {
    e.preventDefault();
    const title    = document.getElementById("ticketTitle").value.trim();
    const desc     = document.getElementById("ticketDesc").value.trim();
    const content  = document.getElementById("ticketContent").value;
    const strategy = document.getElementById("ticketStrategy").value;
    const btn      = document.getElementById("submitBtn");
    const category = [content, strategy].filter(Boolean).join(", ") || "General";

    btn.disabled = true;
    btn.textContent = "Submitting...";

    try {
      await fetch(HOOK_TICKET, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ client_name: CLIENT_NAME, project_gid: PROJECT_GID, title, description: desc, category })
      });

      document.getElementById("ticketForm").reset();
      showToast("&#10003; Request submitted — we will be in touch shortly.");

    } catch (err) {
      showToast("Something went wrong. Please try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit Request";
    }
  }

  // ─────────────────────────────────────────────────────────────
  // Toast
  // ─────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 4000);
  }

  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // Boot
  loadDashboard();
  loadTasks();
</script>
</body>
</html>
